<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리집 집안일 앱</title>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* 화면 깨짐 방지를 위한 핵심 디자인 코드 */
  :root { --bg: #f5f0e8; --surface: #fffdf8; --border: #d8d0c0; --accent: #c85a3a; --green: #4a9060; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); margin: 0; padding: 0; }
  .header { background: var(--surface); padding: 15px; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .header-title { font-family: 'Gowun Dodum', cursive; font-size: 22px; color: var(--accent); }
  .main { padding: 20px; max-width: 600px; margin: 0 auto; }
  .card { background: var(--surface); border-radius: 16px; padding: 20px; border: 1.5px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .chore-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
  .chore-item { background: #fdfaf5; border: 1.5px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; }
  .photo-thumb { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-top: 10px; }
  .btn-upload { width: 100%; margin-top: 10px; padding: 8px; border-radius: 8px; border: 1px dashed var(--accent); cursor: pointer; background: transparent; color: var(--accent); }
  .login-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
  .user-btn { padding: 15px 30px; margin: 5px; border-radius: 10px; border: 2px solid var(--border); background: var(--surface); cursor: pointer; font-weight: 700; }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div style="text-align:center;">
    <h1 style="color:var(--accent); font-family:'Gowun Dodum';">🏠 우리집</h1>
    <div id="userBtns">
      <button class="user-btn" onclick="login('진철')">진철</button>
      <button class="user-btn" onclick="login('진주')">진주 👑</button>
      <button class="user-btn" onclick="login('은수')">은수</button>
      <button class="user-btn" onclick="login('은하')">은하</button>
    </div>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="header">
    <div class="header-title">🏠 우리집</div>
    <div id="userInfo" style="font-weight:700;"></div>
    <button onclick="location.reload()">로그아웃</button>
  </div>
  <div class="main">
    <div class="card">
      <div style="font-weight:700;">📅 오늘의 역할</div>
      <div id="choreGrid" class="chore-grid"></div>
    </div>
  </div>
</div>

<script>
// 사용자님의 Firebase 실제 설정값 적용
const firebaseConfig = {
  apiKey: "AIzaSyDARPxh-WS07lWMeo4IBy4MgWkLpaRxbkQ",
  authDomain: "familyhousehold-cf5a6.firebaseapp.com",
  projectId: "familyhousehold-cf5a6",
  databaseURL: "https://familyhousehold-cf5a6-default-rtdb.firebaseio.com", // 수동 보완
  storageBucket: "familyhousehold-cf5a6.firebasestorage.app",
  messagingSenderId: "1087083698440",
  appId: "1:1087083698440:web:7ddd9f45c28d06368274bd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ROLES = { '진철': '설거지', '진주': '바닥청소', '은수': '분리수거', '은하': '빨래' };
let currentUser = null;

function login(name) {
  currentUser = name;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userInfo').textContent = name + "님";
  syncData();
}

function syncData() {
  const today = new Date().toISOString().slice(0, 10);
  // 서버에서 데이터 실시간 가져오기
  db.ref('dailyPhotos/' + today).on('value', (snapshot) => {
    const data = snapshot.val() || {};
    render(data);
  });
}

function render(data) {
  const grid = document.getElementById('choreGrid');
  grid.innerHTML = '';
  Object.keys(ROLES).forEach(person => {
    const item = document.createElement('div');
    item.className = 'chore-item';
    const photo = data[person];
    
    item.innerHTML = `
      <div style="font-size:12px; color:#666;">${ROLES[person]}</div>
      <div style="font-size:16px; font-weight:700;">${person}</div>
      ${photo ? `<img src="${photo}" class="photo-thumb">` : `<div style="color:var(--accent); font-size:11px; margin-top:10px;">미완료</div>`}
      ${person === currentUser ? `<button class="btn-upload" onclick="uploadPhoto('${person}')">📷 인증하기</button>` : ''}
    `;
    grid.appendChild(item);
  });
}

function uploadPhoto(person) {
  const url = prompt("사진 이미지 주소를 입력하세요 (테스트용):"); 
  if (url) {
    const today = new Date().toISOString().slice(0, 10);
    db.ref('dailyPhotos/' + today + '/' + person).set(url);
    alert("인증 완료!");
  }
}
</script>
</body>
</html>
